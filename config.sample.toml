# --------------------------------------------------------------------------------
# Accounts
# --------------------------------------------------------------------------------

[accounts.example]

# When `--account` is missing, use this account as the default one.
default = true

# --------------------------------------------------------------------------------
# Vdir backend
#
# Local calendar collections stored on disk; see
# <https://vdirsyncer.pimutils.org/en/stable/vdir.html>. Each immediate
# subdirectory of `home-dir` is one calendar.
# --------------------------------------------------------------------------------

vdir.home-dir = "~/.local/share/vdirsyncer/calendars"

# --------------------------------------------------------------------------------
# CalDAV backend
#
# The calendar home set is resolved from the first of these that is set, in
# order of precedence:
#
# 1. `caldav.home`: pre-resolved calendar home set URL; every discovery step is
#    skipped. Fastest, least safe.
# 2. `caldav.server`: principal + home-set discovery start from the given
#    context root. Skips domain resolution.
# 3. `caldav.discover`: a bare domain resolved to a server URL at runtime via
#    pimconf (RFC 6764 SRV + `.well-known`), then principal + home-set
#    discovery. Convenient but adds DNS + HTTP round-trips on every run.
#
# The wizard records both `discover` and `server`: `server` wins, and `discover`
# stays as a fallback to re-resolve from.
# --------------------------------------------------------------------------------

caldav.discover = "example.org"
caldav.server = "https://caldav.example.org/dav/calendars"
#caldav.home = "https://caldav.example.org/dav/calendars/user/me/default"

# Basic authentication (RFC 7617). A `command` secret is a shell command line
# (string, run through the platform shell) or a program + args list; a `raw`
# secret is stored in plaintext.
caldav.auth.basic.username = "username"
caldav.auth.basic.password.command = "pass show example"
#caldav.auth.basic.password.command = ["pass", "show", "example"]
#caldav.auth.basic.password.raw = "password"

# Bearer authentication (RFC 6750), mainly for OAuth 2.0.
#caldav.auth.bearer.token.command = "ortie token show"
#caldav.auth.bearer.token.raw = "oauth2-token"

# TLS configuration.
#caldav.tls.provider = "rustls"
#caldav.tls.rustls.crypto = "ring"
#caldav.tls.cert = "/etc/ssl/certs/ca-certificates.crt"
