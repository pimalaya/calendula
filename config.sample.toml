# ================================================================================
# `calendula` configuration file.
#
# Loaded from the first valid path among:
#   - $XDG_CONFIG_HOME/calendula/config.toml
#   - $HOME/.config/calendula/config.toml
#   - $HOME/.calendularc
#
# Override with `calendula -c <PATH>` or `CALENDULA_CONFIG=<PATH>`. Multiple paths
# can be passed at once, separated by `:`; the first one is the base and the
# rest are deep-merged on top of it.
#
# Run `calendula` once with no config file to launch the wizard, which prompts
# for an account name, lets you pick a backend, then walks you through the vdir
# or CalDAV setup (CalDAV also asks for an email and tests the connection
# before saving). `calendula account configure --account <name>` can be used
# afterwards to edit (or add) an account through the same wizard.
# ================================================================================

# --------------------------------------------------------------------------------
# Global config
# --------------------------------------------------------------------------------

# https://docs.rs/comfy-table/latest/comfy_table/presets/index.html
#table.preset = "в”Ӯв”Ӯв”Җв”Җв•һв•җв•Әв•Ўв”Ҷ    в”¬в”ҙв”Ңв”җв””в”ҳ"

# https://docs.rs/comfy-table/latest/comfy_table/enum.ContentArrangement.html
#table.arrangement = "dynamic"
#table.arrangement = "dynamic-full-width"
#table.arrangement = "disabled"

# Calendar id used by `event` and `item` commands (and `calendar update`)
# when their `-k/--calendar` flag is omitted.
#calendar.default = "personal"

# Default page size for `events list`. The `-s/--page-size` CLI flag wins
# when passed; otherwise the merged account/global value wins; otherwise
# the hard fallback is 25.
#event.list.page-size = 50

# Default page size for `items list`, resolved the same way.
#item.list.page-size = 50

